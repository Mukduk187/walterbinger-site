<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>✦ still being drawn</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
<style>
  :root{ --paper:#f7f2e8; --ink:#1c1a17; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--paper)}
  body{font-family:"Iowan Old Style",Palatino,Georgia,serif;color:var(--ink)}
  canvas{display:block;position:fixed;inset:0}
  .ui{position:fixed;z-index:2;pointer-events:none}
  .back{top:20px;left:24px;pointer-events:auto;font-size:15px;letter-spacing:.03em;
        color:var(--ink);text-decoration:none;opacity:.75}
  .back:hover{opacity:1;text-decoration:underline}
  .sign{left:24px;bottom:22px;max-width:70vw;font-family:"Bradley Hand","Segoe Print","Comic Sans MS",cursive}
  .sign b{display:block;font-size:22px;letter-spacing:.01em;transform:rotate(-1.5deg)}
  .sign span{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-size:13px;opacity:.6;font-style:italic}
  .whisper{right:26px;bottom:24px;font-size:13px;font-style:italic;opacity:0;text-align:right;
           transition:opacity 1.4s ease}
  .whisper.show{opacity:.55}
  @media (max-width:620px){ .sign b{font-size:19px} }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<a class="ui back" href="/">← back to earth</a>
<div class="ui sign"><b>Wally's Wonderland of Weird</b><span>the universe is still being drawn.</span></div>
<div class="ui whisper" id="whisper">move slowly. give something your attention.</div>

<script>
(function(){
  const cv = document.getElementById('sky');
  const ctx = cv.getContext('2d');
  let W,H,DPR;
  const paper = '#f7f2e8', ink = '#1c1a17';

  const pointer = {x:-9999,y:-9999,active:false};
  let stars=[], bulbs=[], scape=[], pigStars=[], pigT=0, awakenCount=0, whisperShown=false, t=0;

  function rand(a,b){return a+Math.random()*(b-a);}

  function build(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*DPR; cv.height = H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);

    // ---- passive sky: many quiet graphite dots, a few anchors ----
    stars = [];
    const n = Math.round(Math.min(180, (W*H)/9000));
    for(let i=0;i<n;i++){
      const x=rand(0,W), y=rand(0, H*0.82);
      stars.push({
        x,y,
        base: rand(0.6,1.6),           // resting dot radius
        anchor: Math.random()<0.06,    // a few discoverable ones
        hue: (x/W)*300 + rand(-20,20), // spectrum by position, earned on attention
        aw: 0,                          // awakening 0..1
        tw: rand(0,Math.PI*2)          // twinkle phase
      });
    }

    // ---- "SOME PIG" hidden in the web (upper-middle sky) ----
    pigStars = layoutText("SOME PIG", W*0.5, H*0.24, Math.min(W*0.06, 34));

    // ---- carnival string of bulbs ----
    bulbs=[];
    const by = H*0.80, count=Math.round(W/46);
    for(let i=0;i<=count;i++){
      const px=i/count, x=px*W;
      const sag=Math.sin(px*Math.PI)*22;
      bulbs.push({x, y: by - 40 + sag, lit:0});
    }

    // ---- simple hand-drawn skyline (the worlds, barely) ----
    scape = H; // drawn procedurally in render()
  }

  // returns array of point-stars approximating text using a scratch canvas
  function layoutText(txt, cx, cy, size){
    const s=document.createElement('canvas'); s.width=600; s.height=140;
    const c=s.getContext('2d');
    c.fillStyle='#000'; c.font='bold 92px Georgia'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText(txt, 300, 70);
    const img=c.getImageData(0,0,600,140).data, pts=[];
    for(let y=0;y<140;y+=6){ for(let x=0;x<600;x+=6){
      if(img[(y*600+x)*4+3]>128 && Math.random()<0.5) pts.push({x:(x-300),y:(y-70)});
    }}
    const scale=size/92;
    return pts.map(p=>({x:cx+p.x*scale*1.05, y:cy+p.y*scale, aw:0}));
  }

  function onMove(e){
    const p = e.touches?e.touches[0]:e;
    pointer.x=p.clientX; pointer.y=p.clientY; pointer.active=true;
    if(!whisperShown){ whisperShown=true; document.getElementById('whisper').classList.remove('show'); }
  }
  window.addEventListener('mousemove',onMove);
  window.addEventListener('touchmove',onMove,{passive:true});
  window.addEventListener('touchstart',onMove,{passive:true});
  window.addEventListener('resize',build);

  function drawScape(){
    ctx.strokeStyle=ink; ctx.lineWidth=1.6; ctx.lineJoin='round'; ctx.globalAlpha=0.9;
    const g=H*0.9;
    // ground line
    ctx.beginPath(); ctx.moveTo(0,g); ctx.lineTo(W,g); ctx.stroke();
    // a windswept pine (Maine / Dirigo)
    const px=W*0.14;
    ctx.beginPath(); ctx.moveTo(px,g); ctx.lineTo(px,g-70);
    ctx.moveTo(px,g-66); ctx.lineTo(px-22,g-50); ctx.moveTo(px,g-52); ctx.lineTo(px+26,g-38);
    ctx.moveTo(px,g-40); ctx.lineTo(px-20,g-28); ctx.stroke();
    // a little tent
    const tx=W*0.30;
    ctx.beginPath(); ctx.moveTo(tx-34,g); ctx.lineTo(tx,g-46); ctx.lineTo(tx+34,g); ctx.moveTo(tx,g-46); ctx.lineTo(tx,g); ctx.stroke();
    // ferris wheel
    const fx=W*0.72, fy=g-58, fr=46;
    ctx.beginPath(); ctx.arc(fx,fy,fr,0,Math.PI*2);
    for(let a=0;a<Math.PI*2;a+=Math.PI/4){ ctx.moveTo(fx,fy); ctx.lineTo(fx+Math.cos(a)*fr, fy+Math.sin(a)*fr); }
    ctx.moveTo(fx-14,g); ctx.lineTo(fx,fy); ctx.lineTo(fx+14,g); ctx.stroke();
    // a couple of little houses (Brooklyn / world)
    const hx=W*0.50;
    ctx.beginPath(); ctx.rect(hx-18,g-30,36,30); ctx.moveTo(hx-24,g-30); ctx.lineTo(hx,g-48); ctx.lineTo(hx+24,g-30); ctx.stroke();
    ctx.globalAlpha=1;
  }

  function render(){
    t+=0.016;
    ctx.clearRect(0,0,W,H);
    // paper
    ctx.fillStyle=paper; ctx.fillRect(0,0,W,H);

    // faint warm vignette top (sky depth) — only a whisper
    const vg=ctx.createRadialGradient(W/2,H*0.15,10,W/2,H*0.15,Math.max(W,H)*0.8);
    vg.addColorStop(0,'rgba(255,255,255,0.35)'); vg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

    // ---- carnival string ----
    ctx.strokeStyle=ink; ctx.globalAlpha=0.5; ctx.lineWidth=1;
    ctx.beginPath(); bulbs.forEach((b,i)=> i?ctx.lineTo(b.x,b.y):ctx.moveTo(b.x,b.y)); ctx.stroke();
    ctx.globalAlpha=1;
    bulbs.forEach(b=>{
      const d=Math.hypot(b.x-pointer.x,b.y-pointer.y);
      const target = pointer.active && d<160 ? (1-d/160) : 0;
      b.lit += (target-b.lit)*0.08;
      if(b.lit>0.02){
        const gr=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,14);
        gr.addColorStop(0,`rgba(255,190,90,${0.55*b.lit})`); gr.addColorStop(1,'rgba(255,190,90,0)');
        ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(b.x,b.y,14,0,7); ctx.fill();
      }
      ctx.fillStyle=ink; ctx.globalAlpha=0.55; ctx.beginPath(); ctx.arc(b.x,b.y,1.6,0,7); ctx.fill(); ctx.globalAlpha=1;
    });

    // ---- stars: update awakening ----
    awakenCount=0;
    for(const s of stars){
      const d=Math.hypot(s.x-pointer.x,s.y-pointer.y);
      const target = pointer.active && d<150 ? Math.pow(1-d/150,1.3) : 0;
      s.aw += (target-s.aw)*(target>s.aw?0.14:0.05);
      if(s.aw>0.35) awakenCount++;
    }

    // ---- constellations between awakened neighbors ----
    for(let i=0;i<stars.length;i++){
      const a=stars[i]; if(a.aw<0.35) continue;
      for(let j=i+1;j<stars.length;j++){
        const b=stars[j]; if(b.aw<0.35) continue;
        const dx=a.x-b.x, dy=a.y-b.y, dd=Math.hypot(dx,dy);
        if(dd<118){
          const al=Math.min(a.aw,b.aw)*(1-dd/118)*0.6;
          const hue=(a.hue+b.hue)/2;
          ctx.strokeStyle=`hsla(${hue},55%,45%,${al})`;
          ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }

    // ---- draw stars ----
    for(const s of stars){
      const tw = 0.75 + 0.25*Math.sin(t*1.6 + s.tw);
      if(s.aw<0.05){
        // resting: quiet graphite dot (anchors a touch brighter + slow twinkle)
        ctx.fillStyle=ink; ctx.globalAlpha = s.anchor? 0.5*tw : 0.28;
        ctx.beginPath(); ctx.arc(s.x,s.y, s.base*(s.anchor?1.1:1), 0,7); ctx.fill();
        ctx.globalAlpha=1;
      } else {
        const aw=s.aw, R=s.base + aw*3.2*tw;
        // watercolor color-bloom, earned by attention
        const gr=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,R*5);
        gr.addColorStop(0,`hsla(${s.hue},60%,60%,${0.5*aw})`);
        gr.addColorStop(1,`hsla(${s.hue},60%,60%,0)`);
        ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(s.x,s.y,R*5,0,7); ctx.fill();
        // the star mark (little 4-point sparkle in ink)
        ctx.fillStyle=`hsla(${s.hue},45%,25%,${0.5+0.5*aw})`;
        ctx.beginPath(); ctx.arc(s.x,s.y,R,0,7); ctx.fill();
        ctx.strokeStyle=`hsla(${s.hue},60%,55%,${aw})`; ctx.lineWidth=1;
        const spk=R*2.4*aw;
        ctx.beginPath();
        ctx.moveTo(s.x-spk,s.y); ctx.lineTo(s.x+spk,s.y);
        ctx.moveTo(s.x,s.y-spk); ctx.lineTo(s.x,s.y+spk); ctx.stroke();
      }
    }

    // ---- SOME PIG: woven into the web when that patch of sky wakes ----
    let pigWake=0;
    for(const p of pigStars){
      const d=Math.hypot(p.x-pointer.x,p.y-pointer.y);
      const target = pointer.active && d<130 ? (1-d/130) : 0;
      p.aw += (target-p.aw)*0.1; pigWake += p.aw;
    }
    pigWake/=pigStars.length;
    // reveal target rises when patch is awake; decays slowly (so it lingers then fades)
    pigT += ((pigWake>0.35?1:0) - pigT) * (pigWake>0.35?0.05:0.012);
    if(pigT>0.02){
      // faint web lines between the pig-stars
      ctx.strokeStyle=`rgba(40,35,30,${0.25*pigT})`; ctx.lineWidth=1;
      for(let i=0;i<pigStars.length;i++){
        for(let j=i+1;j<pigStars.length;j++){
          const a=pigStars[i], b=pigStars[j], dd=Math.hypot(a.x-b.x,a.y-b.y);
          if(dd<26){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
        }
      }
      for(const p of pigStars){
        ctx.fillStyle=`rgba(255,255,255,${0.85*pigT})`;
        ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,7); ctx.fill();
        ctx.fillStyle=`rgba(40,35,30,${0.5*pigT})`;
        ctx.beginPath(); ctx.arc(p.x,p.y,0.9,0,7); ctx.fill();
      }
    }

    drawScape();
    requestAnimationFrame(render);
  }

  build();
  // gentle onboarding whisper if the visitor hasn't moved yet
  setTimeout(()=>{ if(!whisperShown) document.getElementById('whisper').classList.add('show'); }, 2600);
  render();
})();
</script>
</body>
</html>
